<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>古文助動詞 意味あてテスト</title>

    <!-- Webアプリ化・ホーム画面追加用の設定 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="古文助動詞">
    <meta name="theme-color" content="#312e81">
    
    <!-- オリジナルのアプリアイコン -->
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">

    <!-- Tailwind CSS (デザイン用) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@400;500;700&display=swap');
        
        body {
            font-family: 'Noto Sans JP', sans-serif;
        }
        .font-serif {
            font-family: 'Noto Serif JP', serif;
        }
        
        /* フィードバック表示時のアニメーション */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(1rem);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .animate-fade-in-up {
            animation: fadeInUp 0.3s ease-out forwards;
        }
    </style>
</head>
<body class="bg-stone-100 text-gray-800 min-h-screen">

    <div id="app">
        <!-- セットアップ画面 -->
        <div id="setup-view" class="min-h-screen flex items-center justify-center p-4">
            <div class="bg-white max-w-lg w-full rounded-2xl shadow-xl overflow-hidden">
                <div class="bg-indigo-900 text-white p-6 text-center">
                    <h1 class="text-2xl font-bold mb-2 tracking-wider">古文助動詞 意味あてテスト</h1>
                    <p class="text-indigo-200 text-sm">全 <span id="total-questions-display">500</span> 問収録！すべての助動詞を網羅</p>
                </div>
                
                <div class="p-8 space-y-8">
                    <!-- 出題数の選択 -->
                    <div class="space-y-3">
                        <label class="flex items-center text-gray-700 font-semibold mb-2">

                            出題数
                        </label>
                        <div class="grid grid-cols-4 gap-2" id="count-buttons">
                            <!-- JSで生成 -->
                        </div>
                    </div>

                    <!-- 回答方式の選択 -->
                    <div class="space-y-3">
                        <label class="flex items-center text-gray-700 font-semibold mb-2">
                            <svg class="w-5 h-5 mr-2 text-indigo-600" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                            回答方式
                        </label>
                        <div class="grid grid-cols-2 gap-3" id="mode-buttons">
                            <!-- JSで生成 -->
                        </div>
                    </div>

                    <button onclick="startGame()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-lg py-4 rounded-xl shadow-md transition-transform active:scale-95 flex items-center justify-center">
                        <svg class="w-5 h-5 mr-2 fill-current" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                        テストを開始する
                    </button>
                </div>
            </div>
        </div>

        <!-- プレイ画面 -->
        <div id="playing-view" class="hidden min-h-screen flex-col items-center py-8 px-4 font-sans">
            <div class="max-w-3xl w-full">
                <!-- ヘッダー・進捗 -->
                <div class="flex justify-between items-center mb-6 px-2">
                    <div class="text-indigo-800 font-bold text-lg">
                        問題 <span id="current-question-num">1</span> <span class="text-indigo-400 text-sm">/ <span id="total-question-num">10</span></span>
                    </div>
                    <div class="text-gray-500 text-sm font-medium bg-white px-3 py-1 rounded-full shadow-sm">
                        スコア: <span id="current-score">0</span>
                    </div>
                </div>

                <!-- 問題カード -->
                <div class="bg-white rounded-2xl shadow-md p-6 md:p-8 mb-6 border border-stone-200 relative overflow-hidden">
                    <p class="text-gray-500 text-sm mb-6 font-medium">次の傍線部の助動詞の主な意味として、最も適当なものを答えなさい。</p>
                    
                    <div class="my-8 text-center py-8 bg-stone-50 rounded-xl border border-stone-100 shadow-inner" id="question-sentence-container">
                        <!-- 問題文がここに表示される -->
                    </div>

                    <!-- 入力/選択エリア -->
                    <div id="answer-area" class="mt-8">
                        <!-- JSで動的に生成 -->
                    </div>

                    <!-- 結果フィードバックエリア -->
                    <div id="feedback-area" class="hidden mt-8 animate-fade-in-up">
                        <div id="feedback-box" class="p-5 md:p-6 rounded-xl border-2">
                            <div class="flex flex-wrap items-center mb-4" id="feedback-header">
                                <!-- 正解/不正解ヘッダー -->
                            </div>
                            
                            <div class="bg-white p-4 md:p-5 rounded-lg shadow-sm">
                                <div class="mb-2">
                                    <span class="text-xs md:text-sm text-gray-500 font-bold block mb-1">【正解（文法上の意味）】</span>
                                    <span class="text-xl md:text-2xl font-bold text-indigo-900" id="correct-meaning"></span>
                                </div>
                                <div class="mt-4 pt-4 border-t border-gray-100">
                                    <span class="text-xs md:text-sm text-gray-500 font-bold block mb-2">【識別・解説】</span>
                                    <p class="text-gray-700 leading-relaxed text-sm md:text-base" id="explanation-text"></p>
                                </div>
                            </div>
                            
                            <button onclick="nextQuestion()" class="w-full mt-6 bg-gray-900 hover:bg-black text-white font-bold py-4 rounded-xl shadow-md flex items-center justify-center transition-all active:scale-95" id="next-button">
                                次の問題へ
                                <svg class="w-5 h-5 ml-1" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 結果画面 -->
        <div id="result-view" class="hidden min-h-screen flex items-center justify-center p-4">
            <div class="bg-white max-w-md w-full rounded-2xl shadow-xl overflow-hidden text-center">
                <div class="bg-indigo-900 p-8 text-white">
                    <h2 class="text-2xl font-bold mb-4">テスト結果</h2>
                    <div class="text-5xl font-black tracking-widest">
                        <span id="final-score">0</span> <span class="text-2xl text-indigo-300">/ <span id="final-total">10</span></span>
                    </div>
                </div>
                <div class="p-8">
                    <p class="text-gray-600 mb-8 text-lg" id="result-message">
                        よくできました！
                    </p>
                    <button onclick="showSetup()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl shadow-md transition-all flex items-center justify-center active:scale-95">
                        <svg class="w-5 h-5 mr-2" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 9 9 9 9 3"></polyline><path d="M20.49 9A9 9 0 0 0 5.64 5.64L3 9"></path><path d="M3.51 15a9 9 0 0 0 14.85 3.36L21 15"></path><polyline points="21 15 15 15 15 21"></polyline></svg>
                        設定に戻る
                    </button>
                </div>
            </div>
        </div>
    </div>

        // 問題の自動生成ロジック
        const ALL_QUESTIONS = [];

                const sentence = sentenceTemplate.split("[]").join(`[${target}]`);
                ALL_QUESTIONS.push({
                    sentence: sentence,
                    target: target,
                    meaning: meaning,
                    accepted: [meaning],
                    explanation: explanation

        const WORD_BANK = [...new Set(ALL_QUESTIONS.map(q => q.meaning))];

        ALL_QUESTIONS.forEach(q => {
            const opts = new Set([q.meaning]);
            while(opts.size < 4) {
                const randomMeaning = WORD_BANK[Math.floor(Math.random() * WORD_BANK.length)];

        const shuffleArray = (array) => {
            const newArr = [...array];
            for (let i = newArr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArr[i], newArr[j]] = [newArr[j], newArr[i]];

        // 回答処理
        function handleAnswer(answer) {
            if (answerState !== 'idle') return;
            
            const currentQ = questions[currentIndex];
            
            // 正解判定
            let isCorrect = false;
            if (config.mode === 'choice') {
                isCorrect = (answer === currentQ.meaning);
            } else {
                const ansTrim = answer.trim();
                isCorrect = currentQ.accepted.some(acc => 
                    acc === ansTrim || (acc.includes(ansTrim) && ansTrim.length >= 2)
                );
            }

            answerState = isCorrect ? 'correct' : 'incorrect';
            if (isCorrect) score++;

            document.getElementById('current-score').innerText = score;

            // UI更新
            document.getElementById('answer-area').classList.add('hidden'); // 選択肢隠す
            
            const fbArea = document.getElementById('feedback-area');
            const fbBox = document.getElementById('feedback-box');
            const fbHeader = document.getElementById('feedback-header');

            fbArea.classList.remove('hidden');
            
            // アニメーションのリセット
            fbArea.classList.remove('animate-fade-in-up');
            void fbArea.offsetWidth; // reflow
            fbArea.classList.add('animate-fade-in-up');

            if (isCorrect) {
                fbBox.className = "p-5 md:p-6 rounded-xl border-2 bg-green-50 border-green-200";
                fbHeader.innerHTML = `
                    ${ICONS.check}
                    <span class="text-2xl font-bold text-green-700">正解！</span>

            } else {
                fbBox.className = "p-5 md:p-6 rounded-xl border-2 bg-red-50 border-red-200";
                let userAnsHtml = config.mode === 'input' ? `<span class="ml-auto md:ml-4 mt-2 md:mt-0 text-sm text-red-600 bg-red-100 px-3 py-1.5 rounded-md font-medium">あなたの回答: ${answer}</span>` : '';
                fbHeader.innerHTML = `
                    ${ICONS.x}
                    <span class="text-2xl font-bold text-red-700">不正解</span>
                    ${userAnsHtml}
                `;
            }

            document.getElementById('correct-meaning').innerText = currentQ.meaning;
            document.getElementById('explanation-text').innerText = currentQ.explanation;
            
            const nextBtn = document.getElementById('next-button');
            if (currentIndex + 1 < questions.length) {
                nextBtn.innerHTML = `次の問題へ <svg class="w-5 h-5 ml-1" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>`;

            nextBtn.focus();
        }

            document.getElementById('final-total').innerText = questions.length;
            
            let msg = "解説を読んで復習しましょう！📚";
            if (score === questions.length) msg = "全問正解！素晴らしい！🎉";
            else if (score >= questions.length * 0.8) msg = "よくできました！👍";
            else if (score >= questions.length * 0.5) msg = "あともう一息！💪";
            
            document.getElementById('result-message').innerText = msg;
            switchView('result-view');
        }

        // セットアップ画面へ戻る
        function showSetup() {
            switchView('setup-view');
        }

        // 初期化実行
        initSetup();

        // --- Android等のホーム画面追加用設定（マニフェスト） ---
        (function setupManifest() {
            const manifest = {
                name: "古文助動詞 意味あてテスト",
                short_name: "古文助動詞",
                display: "standalone",
                background_color: "#f5f5f4",
                theme_color: "#312e81",
                icons: [{
                    src: "icon.png",  // ← ここで用意した画像ファイルを指定します
                    sizes: "512x512",
                    type: "image/png",
                    purpose: "any maskable"
                }]
            };
            const manifestString = JSON.stringify(manifest);
            const manifestUrl = 'data:application/manifest+json;charset=utf-8,' + encodeURIComponent(manifestString);
            
            const manifestLink = document.createElement('link');
            manifestLink.rel = 'manifest';
            manifestLink.href = manifestUrl;
            document.head.appendChild(manifestLink);
        })();

    </script>
</body>
</html>
